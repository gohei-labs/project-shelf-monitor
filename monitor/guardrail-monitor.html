<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guardrail monitor</title>
  <style>
    :root {
      --bg:#F5F6F8;
      --panel:#FFFFFF;
      --panel-soft:#F9FAFB;
      --ink:#18181B;
      --muted:#667085;
      --line:#D9DEE7;
      --line-strong:#AEB6C2;
      --green:#2F7D32;
      --blue:#1B73E8;
      --amber:#9C6B00;
      --red:#B3261E;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; }
    body { background:var(--bg); color:var(--ink); font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Hiragino Sans", Meiryo, sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; }
    main { max-width:1120px; margin:0 auto; padding:24px 18px 44px; }
    .topnav { display:flex; gap:8px; align-items:center; margin:0 0 22px; }
    .topnav a { color:var(--muted); text-decoration:none; border:1px solid transparent; border-radius:8px; padding:7px 10px; font-size:.86rem; line-height:1; }
    .topnav a:hover { color:var(--ink); background:var(--panel); border-color:var(--line); }
    .topnav a.here { color:var(--ink); background:var(--panel); border-color:var(--line-strong); }
    .pagehead { border-bottom:1px solid var(--line); padding:0 0 18px; }
    .eyebrow { font-size:.72rem; letter-spacing:0; text-transform:uppercase; color:var(--muted); font-weight:700; margin:0; }
    .hero { font-weight:680; font-size:1.72rem; line-height:1.16; letter-spacing:0; margin:6px 0 0; }
    .registry { margin:18px 0 0; }
    .pillsec { padding:22px 0 0; }
    .pillsec + .pillsec { border-top:1px solid var(--line); margin-top:22px; }
    .pillsec > h2 { font-weight:680; font-size:.96rem; margin:0; display:flex; align-items:baseline; gap:10px; letter-spacing:0; }
    .pillsec > h2 .ix { color:var(--muted); font-size:.74rem; font-variant-numeric:tabular-nums; }
    .catsec { margin:14px 0 0; }
    .catlabel { font-size:.7rem; letter-spacing:0; text-transform:uppercase; color:var(--muted); margin:0 0 7px; font-weight:700; }
    .deck { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    .monitor-item { position:relative; display:grid; grid-template-columns:minmax(120px,170px) 1fr minmax(160px,230px); align-items:center; gap:14px; width:100%; min-height:50px; text-align:left; padding:10px 14px 10px 18px; background:var(--panel); border:0; border-top:1px solid var(--line); cursor:pointer; color:var(--ink); font:inherit; }
    .monitor-item:first-child { border-top:0; }
    .monitor-item:hover { background:var(--panel-soft); }
    .monitor-item:focus-visible { outline:2px solid var(--blue); outline-offset:-2px; }
    .cbar { position:absolute; top:0; bottom:0; left:0; width:3px; }
    .ccat { font-size:.72rem; letter-spacing:0; text-transform:uppercase; font-weight:700; overflow-wrap:anywhere; }
    .cnm { font-weight:620; font-size:.92rem; line-height:1.38; letter-spacing:0; color:var(--ink); overflow-wrap:anywhere; }
    .cfoot { display:flex; align-items:center; justify-content:flex-end; gap:8px; min-width:0; }
    .cmk { width:6px; height:6px; flex:0 0 auto; border-radius:50%; }
    .cmk.enf { background:var(--green); }
    .cmk.oth { border:1px solid var(--muted); }
    .cv { font-size:.76rem; letter-spacing:0; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cstatus { flex:0 0 auto; border-radius:999px; border:1px solid transparent; padding:2px 7px; font-size:.7rem; font-weight:700; letter-spacing:0; }
    .status-hard-gate { background:#EEF7EE; border-color:#CFE7D1; color:#1E6B26; }
    .status-conditional-gate { background:#FFF8E8; border-color:#F2D99B; color:#7A5200; }
    .status-external-control { background:#FFF0EE; border-color:#F3C9C5; color:#9F1B16; }
    .status-working-agreement { background:#F1F3F6; border-color:#D7DCE3; color:#46505A; }
    .status-future-control { background:#EEF4FF; border-color:#C9DAFF; color:#184EA8; }
    .monitor-item.disabled { opacity:.55; }
    .backdrop { position:fixed; inset:0; background:rgba(8,8,11,0.74); opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:50; }
    .backdrop.show { opacity:1; pointer-events:auto; }
    .modal { position:fixed; top:50%; left:50%; width:min(560px,92vw); max-height:84vh; overflow:auto; transform:translate(-50%,-50%) scale(0.98); opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; z-index:51; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--ink); box-shadow:0 18px 48px rgba(24,24,27,.22); }
    .modal.show { opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:auto; }
    .mbar { display:block; height:4px; width:100%; }
    .mbody { padding:20px 22px 24px; position:relative; }
    .mclose { position:absolute; top:12px; right:12px; width:32px; height:32px; border:1px solid transparent; background:transparent; color:var(--muted); font-size:1.35rem; line-height:1; cursor:pointer; border-radius:8px; }
    .mclose:hover { background:var(--panel-soft); color:var(--ink); border-color:var(--line); }
    .meb { font-size:.72rem; letter-spacing:0; text-transform:uppercase; font-weight:700; margin:0; }
    .mname { font-weight:680; font-size:1.18rem; letter-spacing:0; line-height:1.28; margin:8px 42px 0 0; }
    .mrule { font-size:.94rem; color:#3F4650; line-height:1.62; margin:12px 0 0; }
    .mdiv { height:1px; background:var(--line); margin:16px 0; }
    .mmeta { margin:0; display:grid; grid-template-columns:120px 1fr; gap:8px 14px; font-size:.84rem; }
    .mmeta dt { color:var(--muted); letter-spacing:0; }
    .mmeta dd { margin:0; color:var(--ink); min-width:0; overflow-wrap:anywhere; }
    .mmeta code { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:.8rem; color:var(--ink); }
    @media (prefers-reduced-motion: reduce) { .modal, .backdrop { transition:none; } }
    @media (max-width:760px) {
      main { padding:18px 12px 36px; }
      .topnav { margin-bottom:18px; }
      .hero { font-size:1.36rem; }
      .monitor-item { grid-template-columns:1fr; gap:5px; align-items:start; padding:11px 12px 11px 18px; }
      .cfoot { justify-content:flex-start; flex-wrap:wrap; }
      .cv { white-space:normal; }
      .mrule { line-break:anywhere; word-break:break-all; }
      .mmeta { grid-template-columns:1fr; gap:3px 0; }
    }
  </style>
</head>
<body>
  <main>
    <nav class="topnav">
      <a class="here" aria-current="page">Guardrails</a>
      <a href="reviews.html">Reviews</a>
    </nav>
    <header class="pagehead">
      <p class="eyebrow">Guardrail monitor</p>
      <h1 class="hero">Guardrail<br />Monitor</h1>

    <div class="registry">
      <section class="pillsec">
        <h2><span class="ix">01</span>Guardrails</h2>
        <div class="catsec">

              <span class="cbar" style="background:#2F7D32"></span>

              <span class="cnm">Secret / token leak scan</span>

            </button>
          </div>
        </div>
        <div class="catsec">
          <p class="catlabel">Build &amp; environment</p>
          <div class="deck">
            <button type="button" class="monitor-item" data-acc="#2F7D32" data-status-key="hard-gate" data-pil="Guardrails" data-cat="Build &amp; environment" data-name="Dev Container build" data-rule="The reproducible Dev Container builds and passes the Bash check suite." data-enf="CI job: devcontainer" data-venue="CI" data-status="Hard gate" data-note="">
              <span class="cbar" style="background:#2F7D32"></span>

              <span class="cbar" style="background:#2F7D32"></span>

              <span class="cbar" style="background:#2F7D32"></span>
              <span class="ccat" style="color:#2F7D32">Governance &amp; tooling</span>

              <span class="cbar" style="background:#2F7D32"></span>
              <span class="ccat" style="color:#2F7D32">Governance &amp; tooling</span>
              <span class="cnm">Branch protection</span>

      <section class="pillsec">
        <h2><span class="ix">02</span>Visualization</h2>
        <div class="catsec">
          <p class="catlabel">Bilingual docs</p>
          <div class="deck">

              <span class="cnm">Documentation language roots</span>

              <span class="ccat" style="color:#1B73E8">Docs portal</span>
              <span class="cnm">Browser-visible control surface</span>

        <div class="catsec">
          <p class="catlabel">Review artifacts</p>

              <span class="ccat" style="color:#1B73E8">Review artifacts</span>
              <span class="cnm">Review artifact terminology</span>

            </button>

              <span class="cbar" style="background:#1B73E8"></span>
              <span class="ccat" style="color:#1B73E8">Review artifacts</span>
              <span class="cnm">Review artifact references</span>
              <span class="cfoot"><span class="cmk enf"></span><span class="cv">CI</span><span class="cstatus status-hard-gate">Hard gate</span></span>
            </button>
          </div>
        </div>
      </section>
      <section class="pillsec">
        <h2><span class="ix">03</span>Human orchestration</h2>
        <div class="catsec">
          <p class="catlabel">Agent context</p>
          <div class="deck">
            <button type="button" class="monitor-item" data-acc="#9C6B00" data-status-key="hard-gate" data-pil="Human orchestration" data-cat="Agent context" data-name="Agent core-context manifest" data-rule="Every required-reading path in the core-context manifest exists and is unique." data-enf="scripts/guardrails/check-agent-core-context.ps1" data-venue="Local + CI" data-status="Hard gate" data-note="">

  <script>
    (function () {
      var cards = Array.prototype.slice.call(document.querySelectorAll('.monitor-item'));
      var bd = document.getElementById('bd');
      var md = document.getElementById('md');
      if (md) {
        var mbar = document.getElementById('mbar'), meb = document.getElementById('meb'), mnm = document.getElementById('mnm'), mrl = document.getElementById('mrl'), mmeta = document.getElementById('mmeta');
        var L = { enf: md.getAttribute('data-l-enf'), venue: md.getAttribute('data-l-venue'), status: md.getAttribute('data-l-status'), note: md.getAttribute('data-l-note') };
        function row(dt, dd, code) { return '<dt>' + dt + '</dt><dd>' + (code ? '<code>' + dd + '</code>' : dd) + '</dd>'; }
        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function openCard(c) {
          var acc = c.getAttribute('data-acc');
          mbar.style.background = acc; meb.style.color = acc;
          meb.textContent = c.getAttribute('data-pil') + ' · ' + c.getAttribute('data-cat');
          mnm.textContent = c.getAttribute('data-name');
          mrl.textContent = c.getAttribute('data-rule') || '';
          var h = '';
          var enf = c.getAttribute('data-enf'); if (enf) { h += row(L.enf, esc(enf), true); }
          h += row(L.venue, esc(c.getAttribute('data-venue') || ''));
          h += row(L.status, esc(c.getAttribute('data-status') || ''));
          var note = c.getAttribute('data-note'); if (note) { h += row(L.note, esc(note)); }
          mmeta.innerHTML = h;
          bd.classList.add('show'); md.classList.add('show');
        }
        function closeModal() { bd.classList.remove('show'); md.classList.remove('show'); }
        cards.forEach(function (c) { c.addEventListener('click', function () { openCard(c); }); });
        bd.addEventListener('click', closeModal);
        document.getElementById('mx').addEventListener('click', closeModal);
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });
      }
    })();
  </script>
